<nav [ngClass]="{
        'bg-[#1e293b]/95 backdrop-blur-md shadow-2xl': isScrolled || isContactActive, 
        'bg-white/70 backdrop-blur-sm': !isScrolled && !isContactActive
     }"
     class="fixed top-0 left-0 w-full z-[1000] transition-all duration-700 border-b border-black/[0.03] py-5 min-h-[80px] flex items-center">
  
  <div class="container mx-auto px-8 md:px-16 flex justify-between items-center">

    <div class="flex-shrink-0">
      <a [routerLink]="['/']" fragment="home" class="flex items-center cursor-pointer group">
        <img src="logo.png" alt="Kaitech Logo" 
             [ngClass]="{'brightness-0 invert': isScrolled || isContactActive, 'brightness-100': !isScrolled && !isContactActive}"
             class="h-8 md:h-10 w-auto object-contain transition-all duration-500 group-hover:scale-105" />
      </a>
    </div>

    <div class="flex items-center gap-12">
      <ul class="hidden md:flex items-center gap-2">
        <li *ngFor="let link of ['home', 'about', 'services', 'projects', 'contact']">
          <a [routerLink]="link === 'contact' ? ['/contact'] : ['/']" 
             [fragment]="link === 'contact' ? undefined : link"
             routerLinkActive="active-link"
             [routerLinkActiveOptions]="{ paths: 'exact', queryParams: 'ignored', matrixParams: 'ignored', fragment: 'exact' }"
             class="nav-link px-5 py-1.5 transition-all duration-700"
             [ngClass]="(isScrolled || isContactActive) ? 'text-white' : 'text-[#1e293b]'">
            {{ 'nav.' + link | transloco }}
          </a>
        </li>
      </ul>

      <div class="flex items-center gap-6 border-l pl-8 ml-2 rtl:border-l-0 rtl:border-r rtl:pl-0 rtl:pr-8"
           [ngClass]="(isScrolled || isContactActive) ? 'border-white/10' : 'border-black/10'">
        
        <button (click)="toggleLanguage()" 
                class="btn-lang relative flex items-center gap-3 px-5 py-2 rounded-full transition-all duration-500 group border"
                [ngClass]="(isScrolled || isContactActive) ? 'bg-white/10 text-white border-white/20 hover:bg-[#14b8a6]' : 'bg-[#1e293b]/5 text-[#1e293b] border-[#1e293b]/20 hover:bg-[#1e293b] hover:text-white'">
          
          <lucide-icon [img]="GlobeIcon" class="w-3.5 h-3.5 transition-transform duration-1000 group-hover:rotate-[360deg]"></lucide-icon>
          
          <span class="font-black uppercase tracking-[0.2em] text-[10px]">
            {{ currentLang === 'ar' ? 'English' : 'عربي' }}
          </span>
        </button>

        <button class="md:hidden" [ngClass]="(isScrolled || isContactActive) ? 'text-white' : 'text-[#1e293b]'" (click)="toggleMenu()">
          <lucide-icon [img]="isOpen() ? XIcon : MenuIcon" class="w-6.5 h-6.5"></lucide-icon>
        </button>
      </div>
    </div>
  </div>
</nav>
