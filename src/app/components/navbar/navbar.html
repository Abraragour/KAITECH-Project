<nav class="bg-[#001030] text-white sticky top-0 z-[1000] shadow-xl border-b border-white/5">
  <div class="container mx-auto px-6 h-20 flex justify-between items-center">

    <a [routerLink]="['/']" fragment="home" class="flex items-center gap-2 group cursor-pointer">
      <img src="logo.png" alt="Kaitech Logo" class="h-10 md:h-12 w-auto object-contain" />
    </a>

    <ul class="hidden md:flex items-center gap-10">
      <li><a [routerLink]="['/']" fragment="home" class="hover:text-[#FF8C00] transition-colors cursor-pointer">{{ 'nav.home' | transloco }}</a></li>
      <li><a [routerLink]="['/']" fragment="about" class="hover:text-[#FF8C00] transition-colors cursor-pointer">{{ 'nav.about' | transloco }}</a></li>
      <li><a [routerLink]="['/']" fragment="services" class="hover:text-[#FF8C00] transition-colors cursor-pointer">{{ 'nav.services' | transloco }}</a></li>
      <li><a [routerLink]="['/']" fragment="projects" class="hover:text-[#FF8C00] transition-colors cursor-pointer">{{ 'nav.projects' | transloco }}</a></li>
    </ul>

    <div class="flex items-center gap-4">
      <button (click)="toggleLanguage()" 
              class="flex items-center gap-2 bg-white/5 hover:bg-white/10 px-4 py-2 rounded-full border border-white/10 transition-all text-sm group">
        <lucide-icon [img]="GlobeIcon" class="text-[#FF8C00] w-4 h-4"></lucide-icon>
        <span class="font-bold uppercase">
          {{ currentLang === 'ar' ? 'English' : 'عربي' }}
        </span>
      </button>

      <button class="md:hidden" (click)="toggleMenu()">
        <lucide-icon [img]="isOpen() ? XIcon : MenuIcon" class="w-7 h-7"></lucide-icon>
      </button>
    </div>
  </div>

  <div *ngIf="isOpen()" 
       class="md:hidden bg-[#001030] border-t border-white/5 p-6 absolute w-full left-0 shadow-2xl">
    <ul class="flex flex-col gap-6 text-center">
      <li><a [routerLink]="['/']" fragment="home" (click)="toggleMenu()" class="text-lg hover:text-[#FF8C00] cursor-pointer block">{{ 'nav.home' | transloco }}</a></li>
      <li><a [routerLink]="['/']" fragment="about" (click)="toggleMenu()" class="text-lg hover:text-[#FF8C00] cursor-pointer block">{{ 'nav.about' | transloco }}</a></li>
      <li><a [routerLink]="['/']" fragment="services" (click)="toggleMenu()" class="text-lg hover:text-[#FF8C00] cursor-pointer block">{{ 'nav.services' | transloco }}</a></li>
      <li><a [routerLink]="['/']" fragment="projects" (click)="toggleMenu()" class="text-lg hover:text-[#FF8C00] cursor-pointer block">{{ 'nav.projects' | transloco }}</a></li>
    </ul>
  </div>
</nav>
