<ng-container *transloco="let t">
  <div [dir]="t('lang') === 'ar' ? 'rtl' : 'ltr'" 
       class="bg-white min-h-screen py-24 relative overflow-hidden flex items-center justify-center">
    
    <div class="absolute inset-0 opacity-[0.05] pointer-events-none select-none">
      <div class="absolute top-1/4 left-1/4 w-96 h-96 border-4 border-dashed border-[#14b8a6] rounded-full animate-slow-spin"></div>
      <div class="absolute bottom-1/4 right-1/4 w-[30rem] h-[30rem] border-2 border-[#14b8a6] animate-slow-reverse-spin"></div>
    </div>

    <div class="container mx-auto px-6 max-w-5xl z-10 relative">
      
      <div class="text-center mb-16 space-y-3 animate-fadeInDown">
        <h2 class="text-[#1e293b] text-6xl md:text-8xl font-black uppercase tracking-tighter italic leading-none">
          {{ t('contact.title') }}
        </h2>
        <div class="w-24 h-2 bg-[#14b8a6] rounded-full mx-auto animate-fadeInUp delay-300 fill-both"></div>
        <p class="text-slate-500 uppercase tracking-[0.5em] text-[10px] font-black pt-2 animate-fadeInUp delay-500 fill-both">
          {{ t('contact.subtitle') || 'Ready to start?' }}
        </p>
      </div>

      <div class="group relative bg-[#1e293b] p-10 md:p-16 shadow-[0_50px_100px_rgba(30,41,59,0.3)] rounded-3xl border border-white/[0.05] overflow-hidden transition-all duration-700 hover:shadow-[#14b8a6]/20 hover:-translate-y-2 animate-fadeInUp">
        
        <form class="space-y-12 relative z-10">
          <div class="grid grid-cols-1 md:grid-cols-2 gap-12">
            <div class="relative group/input">
              <input type="text" required class="contact-input peer" placeholder=" " />
              <label class="contact-label">{{ t('contact.form.name') }}</label>
              <div class="input-animated-line"></div>
            </div>

            <div class="relative group/input">
              <input type="email" required class="contact-input peer" placeholder=" " />
              <label class="contact-label">{{ t('contact.form.email') }}</label>
              <div class="input-animated-line"></div>
            </div>
          </div>

          <div class="relative group/input">
            <textarea rows="5" required class="contact-input peer resize-none" placeholder=" "></textarea>
            <label class="contact-label">{{ t('contact.form.message') }}</label>
            <div class="input-animated-line"></div>
          </div>

          <div class="flex justify-center pt-8 md:pt-12">
            <button type="submit" class="bg-[#14b8a6] text-white px-20 py-6 rounded-full font-black uppercase tracking-[0.3em] text-[11px] shadow-2xl shadow-[#14b8a6]/40 transition-all duration-700 hover:bg-white hover:text-[#1e293b] hover:-translate-y-1 active:scale-95 active:shadow-lg relative overflow-hidden group/btn">
              <span class="relative z-10 flex items-center justify-center gap-4">
                {{ t('contact.form.send') }}
                <svg class="group-hover/btn:translate-x-3 rtl:group-hover/btn:-translate-x-3 transition-transform duration-500" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                  <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
                </svg>
              </span>
            </button>
          </div>
        </form>
      </div>

      <div class="mt-20 flex flex-col md:flex-row justify-center items-center gap-12 text-center text-slate-600 text-xs tracking-widest uppercase font-bold animate-fadeInUp delay-700 fill-both">
        <p class="hover:text-[#14b8a6] transition-colors cursor-pointer">info@kaitech.com</p>
        <div class="w-1 h-1 bg-slate-300 rounded-full hidden md:block"></div>
        <p class="hover:text-[#14b8a6] transition-colors cursor-pointer" dir="ltr">+20 123 456 7890</p>
      </div>

    </div>
  </div>
</ng-container>
