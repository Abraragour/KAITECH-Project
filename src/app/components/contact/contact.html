<div *transloco="let t" [dir]="t('lang') === 'ar' ? 'rtl' : 'ltr'" class="bg-[#001030] min-h-screen">
  <div class="relative flex items-center justify-center p-4 md:p-6 lg:p-10">
    
    <div class="relative bg-white w-full max-w-7xl shadow-2xl animate-slide-up rounded-sm border-t-8 border-[#FF8C00]">
      
      <button [routerLink]="['/']" 
              class="absolute top-6 left-6 z-50 text-[#001030] hover:text-[#FF8C00] transition-transform hover:scale-110">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </button>

      <div class="p-8 md:p-16 lg:p-20">
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-16 items-center">
          
          <div class="bg-[#001030] p-8 md:p-14 relative shadow-2xl h-full">
            <div class="absolute top-0 right-0 w-24 h-1 bg-[#FF8C00] rtl:right-auto rtl:left-0"></div>
            
            <form class="space-y-12 h-full flex flex-col justify-between">
              <div class="relative group">
                <input type="text" required class="w-full bg-transparent border-b border-gray-600 py-3 text-white outline-none focus:border-[#FF8C00] transition-all peer text-start" placeholder=" " />
                <label class="absolute left-0 rtl:left-auto rtl:right-0 top-3 text-gray-500 transition-all pointer-events-none peer-focus:-top-5 peer-focus:text-white peer-focus:text-xs peer-[:not(:placeholder-shown)]:-top-5 peer-[:not(:placeholder-shown)]:text-white peer-[:not(:placeholder-shown)]:text-xs uppercase tracking-widest font-bold">
                   {{ 'contact.form.name' | transloco }}
                </label>
              </div>

              <div class="relative group">
                <input type="email" required class="w-full bg-transparent border-b border-gray-600 py-3 text-white outline-none focus:border-[#FF8C00] transition-all peer text-start" placeholder=" " />
                <label class="absolute left-0 rtl:left-auto rtl:right-0 top-3 text-gray-500 transition-all pointer-events-none peer-focus:-top-5 peer-focus:text-white peer-focus:text-xs peer-[:not(:placeholder-shown)]:-top-5 peer-[:not(:placeholder-shown)]:text-white peer-[:not(:placeholder-shown)]:text-xs uppercase tracking-widest font-bold">
                   {{ 'contact.form.email' | transloco }}
                </label>
              </div>

              <div class="relative group flex-grow">
                <textarea rows="6" required class="w-full h-full bg-transparent border-b border-gray-600 py-3 text-white outline-none focus:border-[#FF8C00] transition-all peer resize-none text-start" placeholder=" "></textarea>
                <label class="absolute left-0 rtl:left-auto rtl:right-0 top-3 text-gray-500 transition-all pointer-events-none peer-focus:-top-5 peer-focus:text-white peer-focus:text-xs peer-[:not(:placeholder-shown)]:-top-5 peer-[:not(:placeholder-shown)]:text-white peer-[:not(:placeholder-shown)]:text-xs uppercase tracking-widest font-bold">
                   {{ 'contact.form.message' | transloco }}
                </label>
              </div>

              <button class="submit-btn group w-full bg-[#FF8C00] text-[#001030] py-5 mt-10 font-black uppercase tracking-widest overflow-hidden transition-all duration-500 hover:bg-white active:scale-95 shadow-xl">
                 <span class="relative z-10 flex items-center justify-center gap-3">
                   {{ 'contact.form.send' | transloco }}
                   <svg class="group-hover:translate-x-2 rtl:group-hover:-translate-x-2 transition-transform" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                     <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
                   </svg>
                 </span>
              </button>
            </form>
          </div>

          <div class="space-y-10 text-end lg:order-last">
            <h2 class="text-[#001030] text-5xl md:text-8xl font-black uppercase tracking-tighter leading-tight">
              {{ 'contact.title' | transloco }}
            </h2>
            <div class="w-20 h-2 bg-[#FF8C00] mb-8 ms-auto"></div>
            
            <p class="text-gray-500 text-lg md:text-xl font-light leading-relaxed max-w-md ms-auto">
              {{ 'contact.desc' | transloco }}
            </p>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-8 items-start mt-12">
               <div class="flex flex-col gap-1 items-end">
                 <span class="text-[10px] uppercase tracking-[0.3em] text-gray-400 font-bold">
                    {{ 'contact.info.phone' | transloco }}
                 </span>
                 <p class="text-[#001030] text-2xl font-black" dir="ltr">+20 123 456 7890</p>
               </div>
               <div class="flex flex-col gap-1 items-end">
                 <span class="text-[10px] uppercase tracking-[0.3em] text-gray-400 font-bold">
                    {{ 'contact.info.email' | transloco }}
                 </span>
                 <p class="text-[#001030] text-2xl font-black">info@kaitech.com</p>
               </div>
            </div>
          </div>

        </div>
      </div>
    </div>
  </div>
</div>
