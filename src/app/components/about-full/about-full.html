<div *transloco="let t" class="pt-40 pb-32 bg-white overflow-hidden scroll-smooth">
  
  <div class="container mx-auto px-8 md:px-16">
    
    <div class="max-w-4xl mb-32 relative">
      <p class="animate-fadeInDown text-[#14b8a6] font-bold uppercase tracking-[0.4em] text-xs mb-6">
        Our Legacy
      </p>
      <h1 class="animate-fadeInUp text-7xl md:text-8xl font-black text-[#1e293b] mb-10 leading-[0.9] tracking-tighter">
        {{ t('aboutFull.heroTitle') }}
      </h1>
      <div class="relative animate-fadeInUp delay-200">
        <div class="absolute left-0 top-0 w-1 h-full bg-[#14b8a6] scale-y-0 origin-top transition-transform duration-1000 delay-300 group-in-view:scale-y-100"></div>
        <p class="text-xl md:text-2xl text-slate-600 leading-relaxed max-w-3xl italic border-l-4 border-slate-100 pl-8 rtl:border-l-0 rtl:border-r-4 rtl:pr-8">
          {{ t('aboutFull.detailedStory1') }}
        </p>
      </div>
    </div>

    <div class="mt-40 animate-fadeIn" style="animation-delay: 0.4s">
      <div class="flex items-end justify-between mb-20 border-b border-slate-100 pb-10 relative">
        <h2 class="text-4xl md:text-5xl font-black text-[#1e293b] tracking-tighter">
          {{ t('aboutFull.teamTitle') }}
        </h2>
        <span class="text-[#14b8a6] font-bold tracking-widest uppercase text-xs">Meet the experts</span>
        <div class="absolute bottom-0 left-0 w-32 h-1 bg-[#14b8a6] animate-pulse"></div>
      </div>

      <div class="grid md:grid-cols-3 gap-x-12 gap-y-24">
        <div *ngFor="let member of t('aboutFull.team')" class="team-card group cursor-pointer animate-fadeInUp">
          
          <div class="relative overflow-hidden aspect-[3/4] mb-8 shadow-sm group-hover:shadow-2xl transition-all duration-700">
            <img [src]="member.img" 
                 class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-105" 
                 alt="{{ member.name }}">
            
            </div>

          <div class="relative pl-6 rtl:pl-0 rtl:pr-6 border-l border-slate-100 rtl:border-l-0 rtl:border-r transition-colors duration-300 group-hover:border-[#14b8a6]">
            
            <h3 class="text-2xl font-black text-[#1e293b] mb-1 group-hover:text-[#14b8a6] transition-colors duration-300">
              {{ member.name }}
            </h3>
            <p class="text-[#14b8a6] font-bold text-xs uppercase tracking-widest transition-transform duration-300 group-hover:translate-x-1 rtl:group-hover:-translate-x-1">
              {{ member.position }}
            </p>
          </div>
        </div>
      </div>
    </div>

  </div>
</div>
