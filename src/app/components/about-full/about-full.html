<div *transloco="let t" class="pt-32 pb-24 bg-white">
  <div class="container mx-auto px-8">
    <div class="max-w-3xl mb-24">
      <h1 class="text-6xl font-black text-[#001030] mb-8 uppercase">{{ t('aboutFull.heroTitle') }}</h1>
      <p class="text-xl text-gray-600 leading-relaxed">{{ t('aboutFull.detailedStory1') }}</p>
    </div>

    <div class="mt-24">
      <h2 class="text-4xl font-black mb-12 border-b-4 border-[#FF8C00] inline-block">{{ t('aboutFull.teamTitle') }}</h2>
      <div class="grid md:grid-cols-3 gap-12">
        <div *ngFor="let member of t('aboutFull.team')" class="group">
          <div class="relative overflow-hidden bg-gray-200 h-80 mb-4">
<img [src]="member.img" class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110">          <h3 class="text-xl font-bold text-[#001030]">{{ member.name }}</h3>
          <p class="text-[#FF8C00] font-bold text-sm uppercase">{{ member.position }}</p>
        </div>
      </div>
    </div>
  </div>
</div>
