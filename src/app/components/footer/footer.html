<footer class="bg-[#1e293b] py-16 border-t border-white/[0.05]" *transloco="let t">
  <div class="container mx-auto px-8 flex flex-col items-center gap-10">
    
    <div class="flex gap-12">
      <a *ngFor="let social of socialLinks" 
         [href]="social.link" 
         class="text-slate-500 hover:text-[#14b8a6] transition-all duration-300 transform hover:-translate-y-1">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
          <path [attr.d]="social.iconPath" />
        </svg>
      </a>
    </div>

    <div class="text-center space-y-2">
      <p class="text-slate-500 text-[10px] tracking-[0.5em] uppercase font-black">
        © {{ currentYear }} KAITECH
      </p>
      <p class="text-slate-600 text-[8px] tracking-[0.2em] uppercase">
        Engineering Excellence • All Rights Reserved
      </p>
    </div>
    
  </div>
</footer>
