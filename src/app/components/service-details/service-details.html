<div *transloco="let t" class="min-h-screen py-32 bg-white">
  <div class="container mx-auto px-8">
    
    <div *ngFor="let ser of t('services.items')">
      
      <div *ngIf="ser.id === serviceId" class="animate-fade-in">
        
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-16 items-center">
          
          <div class="space-y-8">
            <span class="text-[#FF8C00] font-bold tracking-[0.3em] uppercase block">
              {{ t('services.subtitle') }} / {{ ser.id }}
            </span>
            
            <h1 class="text-6xl md:text-8xl font-black text-[#001030] uppercase italic tracking-tighter">
              {{ ser.title }}
            </h1>
            
            <div class="w-24 h-2 bg-[#FF8C00]"></div>
            
            <p class="text-gray-600 text-xl leading-relaxed max-w-xl">
              {{ ser.description }}
            </p>
          </div>

          <div class="bg-[#001030] p-12 shadow-2xl relative overflow-hidden">
            <div class="absolute top-0 right-0 w-32 h-1 bg-[#FF8C00]"></div>
            
            <h3 class="text-white text-3xl font-black mb-6 uppercase italic">
              {{ t('serviceDetails.impactTitle') }}
            </h3>
            
            <p class="text-gray-400 text-lg leading-loose">
              {{ t('serviceDetails.impactDesc', { serviceName: ser.title }) }}
            </p>
          </div>

        </div>

      </div>
    </div>

  </div>
</div>
