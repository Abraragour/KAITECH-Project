<div *transloco="let t" class="min-h-screen pt-40 pb-24 bg-white overflow-hidden">
  <div class="container mx-auto px-8 md:px-16">
    
    <ng-container *ngFor="let ser of t('services.items')">
      
      <div *ngIf="ser.id == serviceId" class="relative animate-fadeIn">
        
        <span class="absolute -top-20 -left-10 text-[20rem] font-black text-slate-50 -z-10 select-none">
          0{{ ser.id }}
        </span>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-20 items-start">
          
          <div class="space-y-10">
            <div class="space-y-4">
              <span class="text-[#14b8a6] font-bold tracking-[0.4em] uppercase text-xs flex items-center gap-4">
                <span class="w-12 h-[1px] bg-[#14b8a6]"></span>
                {{ t('services.subtitle') }}
              </span>
              <h1 class="text-7xl md:text-8xl font-black text-[#1e293b] uppercase tracking-tighter leading-[0.9]">
                {{ ser.title }}
              </h1>
            </div>
            <div class="w-24 h-2 bg-[#14b8a6] rounded-full animate-expandWidth"></div>
            <p class="text-slate-500 text-xl md:text-2xl leading-relaxed max-w-xl border-l-4 border-slate-100 pl-8 rtl:border-l-0 rtl:border-r-4 rtl:pr-8 animate-fadeIn delay-300">
              {{ ser.description }}
            </p>
          </div>

          <div class="relative animate-slideInRight">
            <div class="absolute -bottom-6 -right-6 w-full h-full border-2 border-slate-100 -z-10 translate-x-4 translate-y-4"></div>
            <div class="bg-[#1e293b] p-12 md:p-16 shadow-[0_50px_100px_rgba(0,0,0,0.2)] relative overflow-hidden group">
              <h3 class="text-white text-4xl font-black mb-8 uppercase tracking-tight relative z-10">
                {{ t('serviceDetails.impactTitle') }}
              </h3>
              <p class="text-slate-400 text-lg md:text-xl leading-loose relative z-10">
                {{ t('serviceDetails.impactDesc', { serviceName: ser.title }) }}
              </p>
              <div class="mt-12 flex gap-2 relative z-10">
                <span class="w-2 h-2 rounded-full bg-[#14b8a6]"></span>
                <span class="w-20 h-2 rounded-full bg-slate-700"></span>
              </div>
            </div>
          </div>

        </div>
      </div>
    </ng-container>

  </div>
</div>
