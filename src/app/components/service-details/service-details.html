<div *transloco="let t" class="min-h-screen pt-40 pb-24 bg-white overflow-hidden relative">
  <div class="container mx-auto px-8 md:px-16">
    
    <ng-container *ngFor="let ser of t('services.items')">
      <div *ngIf="ser.id == serviceId" class="relative animate-fadeIn">
        
        <span class="absolute -top-32 -left-20 text-[15rem] md:text-[25rem] font-black text-slate-50/40 -z-10 select-none pointer-events-none rtl:left-auto rtl:-right-20">
          {{ ser.id }}
        </span>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-16 items-center">
          
          <div class="lg:col-span-7 space-y-8">
            <div class="space-y-4">
              <span class="text-[#14b8a6] font-bold tracking-[0.4em] uppercase text-xs flex items-center gap-4">
                <span class="w-12 h-[1px] bg-[#14b8a6]"></span>
                {{ t('services.subtitle') }}
              </span>
              <h1 class="text-4xl md:text-5xl lg:text-6xl font-black text-[#1e293b] uppercase tracking-tighter leading-tight max-w-xl">
                {{ ser.title }}
              </h1>
            </div>
            
            <div class="w-24 h-2 bg-[#14b8a6] rounded-full animate-expandWidth"></div>
            
            <p class="text-slate-500 text-lg md:text-xl leading-relaxed max-w-2xl border-l-4 border-[#14b8a6]/20 pl-8 rtl:border-l-0 rtl:border-r-4 rtl:pr-8 animate-fadeIn delay-300">
              {{ ser.description }}
            </p>
          </div>

          <div class="lg:col-span-5 relative animate-slideInRight">
            <div class="absolute -bottom-6 -right-6 w-full h-full border-2 border-slate-100 -z-10 translate-x-4 translate-y-4"></div>
            <div class="bg-[#1e293b] p-10 md:p-14 shadow-[0_50px_100px_rgba(0,0,0,0.2)] relative overflow-hidden group rounded-sm">
              <div class="absolute top-0 right-0 w-32 h-32 bg-[#14b8a6]/5 -mr-16 -mt-16 rounded-full"></div>
              
              <h3 class="text-white text-3xl font-black mb-8 uppercase tracking-tight relative z-10">
                {{ t('serviceDetails.impactTitle') }}
              </h3>
              <p class="text-slate-400 text-lg leading-loose relative z-10">
                {{ t('serviceDetails.impactDesc', { serviceName: ser.title }) }}
              </p>
              
              <div class="mt-12 flex items-center gap-3 relative z-10">
                <span class="w-3 h-3 rounded-full bg-[#14b8a6] animate-pulse"></span>
                <span class="w-24 h-[2px] bg-slate-700"></span>
              </div>
            </div>
          </div>

        </div>
      </div>
    </ng-container>

  </div>
</div>
