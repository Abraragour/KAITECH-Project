<div *transloco="let t" class="min-h-screen py-32 bg-white">
  <div class="container mx-auto px-8">
    
    <div *ngFor="let proj of t('projects.items')">
      <div *ngIf="proj.id === projectId" class="animate-fade-in">
        
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-16 items-center">
          
          <div class="space-y-8">
            <span class="text-[#FF8C00] font-bold tracking-[0.3em] uppercase block">
              {{ t('projects.subtitle') }} / {{ proj.id }}
            </span>
            
            <h1 class="text-6xl font-black text-[#001030] uppercase italic">
              {{ proj.title }}
            </h1>
            
            <div class="w-24 h-2 bg-[#FF8C00]"></div>
            
            <h3 class="text-2xl font-bold text-[#001030]">
              {{ t('projectDetails.overview') }}
            </h3>

            <p class="text-gray-600 text-xl leading-relaxed">
              {{ t('projectDetails.description', { projectName: proj.title }) }}
            </p>
          </div>

          <div class="relative shadow-2xl rounded-xl overflow-hidden">
<img [src]="'/' + proj.img" class="w-full h-auto object-cover">          </div>

        </div>

      </div>
    </div>

  </div>
</div>
