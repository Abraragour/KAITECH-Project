<div *transloco="let t" class="min-h-screen pt-40 pb-24 bg-white overflow-hidden">
  <div class="container mx-auto px-8 md:px-16">
    
    <ng-container *ngFor="let proj of t('projects.items')">
      <div *ngIf="proj.id == projectId" class="relative animate-fadeIn">
        
        <span class="absolute -top-24 -right-10 text-[22rem] font-black text-slate-50 -z-10 select-none">
          {{ proj.id }}
        </span>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-20 items-center">
          
          <div class="space-y-10">
            <div class="space-y-4">
              <span class="text-[#14b8a6] font-bold tracking-[0.4em] uppercase text-xs flex items-center gap-4">
                <span class="w-12 h-[1px] bg-[#14b8a6]"></span>
                {{ t('projects.subtitle') }}
              </span>
              <h1 class="text-6xl md:text-8xl font-black text-[#1e293b] uppercase tracking-tighter leading-none italic">
                {{ proj.title }}
              </h1>
            </div>

            <div class="w-24 h-2 bg-[#14b8a6] rounded-full"></div>
            
            <div class="space-y-6">
              <h3 class="text-2xl font-black text-[#1e293b]">
                {{ t('projectDetails.overview') }}
              </h3>
              <p class="text-slate-500 text-xl leading-relaxed max-w-xl border-l-4 border-slate-100 pl-8 rtl:border-r-4 rtl:border-l-0 rtl:pr-8">
                {{ t('projectDetails.description', { projectName: proj.title }) }}
              </p>
            </div>
          </div>

          <div class="relative group">
            <div class="absolute inset-0 border-2 border-[#14b8a6] translate-x-6 translate-y-6 -z-10"></div>
            <div class="relative shadow-2xl rounded-2xl overflow-hidden bg-[#1e293b]">
                <img [src]="'/' + proj.img" class="w-full h-[600px] object-cover opacity-90">
            </div>
          </div>

        </div>
      </div>
    </ng-container>

  </div>
</div>
