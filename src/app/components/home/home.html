<section id="home" class="h-screen w-full relative overflow-hidden bg-white">
  <ng-container *ngIf="('hero' | transloco) as slides">
    <swiper-container #swiperEl 
                      dir="ltr" 
                      navigation="false" 
                      pagination="true" 
                      effect="fade" 
                      speed="1200" 
                      autoplay-delay="5000" 
                      loop="true" 
                      class="h-full w-full">

      <swiper-slide *ngFor="let slide of $any(slides)">
        <div class="relative h-full w-full flex items-center">
          
          <div class="absolute inset-0 overflow-hidden pointer-events-none">
            <div class="absolute inset-0 bg-cover bg-center animate-slow-zoom" 
                 [style.backgroundImage]="'url(' + slide.img + ')'">
            </div>
            
            <div class="absolute inset-0 bg-gradient-to-b from-white/10 via-white/30 to-white/80 backdrop-blur-[1px]"></div>
          </div>

          <div class="container mx-auto px-6 md:px-16 z-10 h-full flex flex-col justify-end pb-40">
            <div class="max-w-5xl" [ngClass]="{'ml-auto text-right': translocoService.getActiveLang() === 'ar'}">
              
              <p class="animate-fadeInDown text-xs uppercase tracking-[0.5em] font-bold text-[#14b8a6] mb-4">
                {{ 'Featured Projects' }}
              </p>

              <h1 class="animate-fadeInUp text-7xl md:text-9xl font-black text-[#1e293b] leading-[0.9] tracking-tighter mb-8">
                {{ slide.title }}
              </h1>

              <p class="animate-fadeInUp delay-200 text-lg md:text-xl font-medium text-[#475569] leading-relaxed italic max-w-2xl"
                 [ngClass]="{'ml-auto': translocoService.getActiveLang() === 'ar'}">
                 Innovative engineering and quality. Build with KAITECH.
              </p>

            </div>
          </div>
        </div>
      </swiper-slide>
    </swiper-container>
  </ng-container>
</section>

<app-about id="about"></app-about>
<app-services id="services"></app-services>
<app-projects id="projects"></app-projects>
