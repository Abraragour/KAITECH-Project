<section id="projects" class="py-24 bg-white" *transloco="let t">
  <div class="container mx-auto px-8 lg:px-16">
    
    <div class="text-center mb-16 animate-fadeIn">
      <span class="text-[#14b8a6] font-bold tracking-[0.4em] uppercase text-xs block mb-4">
        {{ t('projects.subtitle') }}
      </span>
      <h2 class="text-5xl md:text-6xl font-black text-[#1e293b] uppercase tracking-tighter">
        {{ t('projects.title') }}
      </h2>
      
      <div class="flex flex-wrap justify-center gap-2 mt-12">
        <button *ngFor="let f of filters | keyvalue: returnZero"
          (click)="setFilter($any(f.key))"
          [class]="currentFilter === f.key ? 'bg-[#1e293b] text-white shadow-lg' : 'bg-slate-50 text-slate-500 hover:bg-slate-100'"
          class="px-8 py-3 text-[10px] font-black uppercase tracking-[0.2em] transition-all duration-300 rounded-full outline-none">
          {{ f.value }}
        </button>
      </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10">
      <div *ngFor="let project of filteredProjects" 
           [routerLink]="['/project', project.id]" 
           class="project-card group relative h-[450px] overflow-hidden bg-[#1e293b] rounded-[2rem] cursor-pointer shadow-xl transition-all duration-500">
        
        <img [src]="project.img" [alt]="project.title" 
             class="w-full h-full object-cover opacity-90 group-hover:opacity-40 group-hover:scale-110 transition-all duration-700" />
        
        <div class="absolute inset-0 bg-gradient-to-t from-[#1e293b] via-transparent to-transparent opacity-60"></div>

        <div class="absolute inset-0 flex flex-col justify-end p-10 translate-y-6 group-hover:translate-y-0 transition-transform duration-500 rtl:text-right">
          
          <div class="overflow-hidden">
            <span class="text-[#14b8a6] font-bold text-xs uppercase tracking-widest mb-3 block transform -translate-y-4 group-hover:translate-y-0 transition-transform duration-500 delay-100">
              {{ getCategoryLabel(project.category) }}
            </span>
          </div>

          <h3 class="text-3xl font-black text-white uppercase leading-[1.1] mb-6 transform translate-y-2 group-hover:translate-y-0 transition-transform duration-500">
            {{ project.title }}
          </h3>
          
          <div class="flex items-center gap-3 group/btn">
            <span class="text-white text-[10px] font-bold uppercase tracking-[0.3em] opacity-0 group-hover:opacity-100 transition-opacity duration-500 delay-200">
              {{ t('projects.readMore') }}
            </span>
            <div class="w-10 h-10 rounded-full border border-white/20 flex items-center justify-center group-hover:bg-[#14b8a6] group-hover:border-[#14b8a6] transition-all duration-500">
              <svg class="text-white rtl:rotate-180" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                <path d="M5 12h14m-7-7 7 7-7 7" />
              </svg>
            </div>
          </div>
        </div>

        <div class="absolute inset-6 border border-white/10 rounded-[1.5rem] pointer-events-none group-hover:inset-4 group-hover:border-white/20 transition-all duration-500"></div>
      </div>
    </div>

    <div class="text-center mt-16" *ngIf="hasMoreProjects">
      <button (click)="showMore()" 
              class="px-12 py-4 bg-[#1e293b] text-white rounded-full font-black uppercase tracking-[0.2em] text-[10px] transition-all duration-300 hover:bg-[#14b8a6] hover:shadow-xl">
        {{ t('projects.readMore') }}
      </button>
    </div>

  </div>
</section>
