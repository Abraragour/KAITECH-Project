<section id="projects" class="py-24 bg-white" *transloco="let t">
  <div class="container mx-auto px-8">
    <div class="text-center mb-16">
      <span class="text-[#FF8C00] font-bold tracking-widest uppercase text-sm">
        {{ t('projects.subtitle') }}
      </span>
      <h2 class="text-4xl md:text-6xl font-black text-[#001030] mt-4 uppercase">
        {{ t('projects.title') }}
      </h2>
      
      <div class="flex flex-wrap justify-center gap-4 mt-10">
        <button *ngFor="let f of filters | keyvalue: returnZero"
          (click)="setFilter($any(f.key))"
          [class]="currentFilter === f.key ? 'border-[#FF8C00] text-[#FF8C00]' : 'border-transparent text-gray-400 hover:text-[#001030]'"
          class="px-8 py-2 text-sm font-bold uppercase tracking-wider transition-all border-b-2 outline-none">
          {{ f.value }}
        </button>
      </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
      <div *ngFor="let project of filteredProjects" 
           [routerLink]="['/project', project.id]" 
           class="group relative h-[400px] overflow-hidden bg-[#001030] cursor-pointer">
        
        <img [src]="project.img" [alt]="project.title" 
             class="w-full h-full object-cover opacity-80 group-hover:opacity-40 group-hover:scale-110 transition-all duration-700" />
        
        <div class="absolute inset-0 flex flex-col justify-end p-8 translate-y-8 group-hover:translate-y-0 transition-transform duration-500 rtl:text-right">
          <span class="text-[#FF8C00] font-bold text-xs uppercase mb-2">
            {{ getCategoryLabel(project.category) }}
          </span>
          <h3 class="text-2xl font-black text-white uppercase leading-tight">
            {{ project.title }}
          </h3>
          
          <div class="flex items-center gap-2 group/btn mt-4">
            <button class="text-[#FF8C00] font-bold uppercase text-sm tracking-widest">
              {{ t('readMore') }}
            </button>
            
            <svg class="text-[#FF8C00] transition-transform duration-300 group-hover/btn:translate-x-2 rtl:rotate-180 rtl:group-hover/btn:-translate-x-2" 
                 width="18" height="18" viewBox="0 0 24 24" fill="none" 
                 stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
              <path d="M5 12h14" />
              <path d="m12 5 7 7-7 7" />
            </svg>
          </div>

          <div class="w-12 h-1 bg-[#FF8C00] mt-2 opacity-0 group-hover:opacity-100 transition-opacity"></div>
        </div>
      </div>
    </div>
  </div>
</section>
