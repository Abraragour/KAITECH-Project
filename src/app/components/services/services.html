<section id="services" class="py-20 bg-slate-50" *transloco="let t">
  <div class="container mx-auto px-8 md:px-16">
    
    <div class="mb-16 text-center">
      <h2 class="text-5xl font-black text-[#1e293b] tracking-tighter uppercase mb-4">
        {{ t('services.title') }}
      </h2>
      <div class="w-16 h-1 bg-[#14b8a6] mx-auto"></div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
      
      <div *ngFor="let ser of filteredServices; let i = index" 
           [routerLink]="['/service', ser.id?.toString()]" 
           class="service-card group relative h-full overflow-hidden cursor-pointer transition-all duration-500 rounded-2xl shadow-sm hover:shadow-xl"
           [ngClass]="{
             'bg-[#1e293b] text-white': i % 2 === 0, 
             'bg-white text-[#1e293b] border border-slate-100': i % 2 !== 0
           }">
           <div class="relative z-10 flex flex-col items-center justify-center h-full text-center py-10 px-6 gap-6">
            
            <div class="transition-transform duration-500 group-hover:-translate-y-2">
              <svg [ngClass]="(i % 2 === 0) ? 'text-[#14b8a6]' : 'text-[#14b8a6]'" 
                   width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
              </svg>
            </div>
            
            <h3 class="text-lg font-black uppercase tracking-tight">
              {{ ser.title }}
            </h3>
            
            <div class="flex items-center gap-2 font-bold text-[9px] tracking-widest uppercase opacity-80 group-hover:opacity-100">
                <span>{{ t('services.readMore') }}</span>
                <svg class="rtl:rotate-180 transition-transform duration-300 group-hover:translate-x-2" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                    <path d="M5 12h14"/><path d="m12 5 7 7-7 7"/>
                </svg>
            </div>
        </div>

        <span class="absolute bottom-4 right-6 text-6xl font-black opacity-5 pointer-events-none">
          {{ ser.id }}
        </span>
      </div>

    </div>

    <div class="text-center mt-16" *ngIf="hasMoreServices">
      <button (click)="showMore()" 
              class="px-12 py-4 bg-[#1e293b] text-white rounded-full font-black uppercase tracking-[0.2em] text-[10px] transition-all duration-300 hover:bg-[#14b8a6] hover:shadow-xl">
        {{ t('services.readMore') }}
      </button>
    </div>

  </div>
</section>
