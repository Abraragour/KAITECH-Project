<section id="services" class="py-24 bg-white" *transloco="let t">
  <div class="container mx-auto px-8">
    
    <div class="mb-16 rtl:text-right">
      <span class="text-[#FF8C00] font-bold tracking-[0.3em] text-[11px] uppercase block mb-2">
        {{ t('services.subtitle') }}
      </span>
      <h2 class="text-5xl font-black text-[#001030] tracking-tighter uppercase italic">
        {{ t('services.title') }}
      </h2>
    </div>

    <div class="services-grid">
      <div *ngFor="let ser of t('services.items', { read: 'true' })" 
           [routerLink]="['/service', ser.id?.toString()]" 
           class="service-card group cursor-pointer">
    
        <div class="rtl:text-right">
            <h3 class="service-title">{{ ser.title }}</h3>
            
            <div class="read-more-btn">
                {{ t('services.readMore') }} 
                <svg class="rtl:rotate-180" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M5 12h14"/><path d="m12 5 7 7-7 7"/>
                </svg>
            </div>
        </div>

        <span class="bg-number">{{ ser.id }}</span>
      </div>
    </div>
  </div>
</section>
