<section id="about" class="py-24 bg-white overflow-hidden" *transloco="let t">
  <div class="container mx-auto px-8 md:px-16">
    <div class="grid md:grid-cols-2 gap-20 items-center">
      
      <div class="animate-fadeIn">
        <h4 class="text-[#14b8a6] font-bold uppercase tracking-[0.3em] text-xl mb-4">
          {{ t('aboutPage.title') }}
        </h4>
        <h2 class="text-5xl md:text-6xl font-black text-[#1e293b] mb-8 leading-[1.1] tracking-tighter">
          {{ t('aboutPage.subtitle') }}
        </h2>
        <p class="text-slate-600 text-lg leading-relaxed mb-10 italic">
          {{ t('aboutPage.story') }}
        </p>

        <div class="grid gap-8">
          <div *ngFor="let value of t('aboutPage.values')" 
               class="flex gap-4 border-l-2 border-[#14b8a6] pl-6 rtl:border-l-0 rtl:border-r-2 rtl:pr-6 group">
            <div>
              <h5 class="font-bold text-[#1e293b] group-hover:text-[#14b8a6] transition-colors duration-300">
                {{ value.title }}
              </h5>
              <p class="text-sm text-slate-500 leading-relaxed">{{ value.desc }}</p>
            </div>
          </div>
        </div>

        <div class="mt-12">
          <a [routerLink]="['/about-full']" 
             class="inline-flex items-center gap-3 border-b-2 border-[#1e293b] text-[#1e293b] pb-1 font-bold uppercase tracking-widest hover:text-[#14b8a6] hover:border-[#14b8a6] transition-all duration-300 no-underline group">
<span>{{ 'aboutPage.moreHistory' | transloco }}</span>             <span class="transition-transform group-hover:translate-x-2">→</span>
          </a>
        </div>
      </div>

      <div class="relative">
        <div class="relative z-10 overflow-hidden shadow-2xl">
          <img 
            src="aboutt.jpeg" 
            alt="Engineering" 
            class="w-full h-[600px] object-cover transition-transform duration-1000 hover:scale-110" 
          />
        </div>
        <div class="absolute -bottom-10 -right-10 bg-[#14b8a6] p-10 hidden md:block shadow-2xl z-20 rtl:right-auto rtl:-left-10">
          <p class="text-5xl font-black text-white mb-1">
            {{ t('aboutPage.experienceBox.number') }}
          </p>
          <p class="text-xs font-bold uppercase tracking-widest text-white/90">
            {{ t('aboutPage.experienceBox.text') }}
          </p>
        </div>
        <div class="absolute top-10 -left-10 w-full h-full border-2 border-slate-100 -z-10 hidden md:block"></div>
      </div>

    </div>
  </div>
</section>
